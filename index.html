<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S.</title>
    <link rel="icon" href="/images/favicon.ico" type="icono" />
    <link href="./src/index.css" rel="stylesheet" />
  </head>

  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          alt="Logotipo Around The U.S."
          class="logo header__logo"
          src="/images/logo.svg"
        />
      </header>

      <main class="content">
        <section class="profile page__section">
          <div class="profile__image-container">
            <img class="profile__image" src="/images/avatar.jpg" alt="Avatar" />
            <div class="profile__image-overlay"></div>
          </div>

          <div class="profile__info">
            <h1 class="profile__title">Jacques Cousteau</h1>

            <button
              aria-label="Editar perfil"
              class="profile__edit-button"
              type="button"
            ></button>

            <p class="profile__description">Explorador</p>
          </div>

          <button
            aria-label="Agregar tarjeta"
            class="profile__add-button"
            type="button"
          ></button>
        </section>

        <section class="cards page__section">
          <ul class="cards__list"></ul>
        </section>
      </main>

      <footer class="footer page__section">
        <p class="footer__copyright">© 2026 Around The U.S.</p>
      </footer>

      <div class="popup popup_type_edit-profile">
        <div class="popup__content">
          <button class="popup__close" type="button"></button>
          <h3 class="popup__title">Editar perfil</h3>

          <form class="popup__form" id="edit-profile-form" novalidate>
            <input
              id="profile-name"
              class="popup__input"
              name="name"
              placeholder="Nombre"
              type="text"
              required
              minlength="2"
              maxlength="40"
            />
            <span id="profile-name-error" class="form__input-error"></span>

            <input
              id="profile-description"
              class="popup__input"
              name="description"
              placeholder="Acerca de mí"
              type="text"
              required
              minlength="2"
              maxlength="200"
            />
            <span
              id="profile-description-error"
              class="form__input-error"
            ></span>

            <button class="popup__button" type="submit">Guardar</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_new-card">
        <div class="popup__content">
          <button class="popup__close" type="button"></button>
          <h3 class="popup__title">Nuevo lugar</h3>

          <form class="popup__form" id="add-card-form" novalidate>
            <input
              id="place-name"
              class="popup__input"
              name="title"
              placeholder="Título"
              type="text"
              required
              minlength="2"
              maxlength="30"
            />
            <span id="place-name-error" class="form__input-error"></span>

            <input
              id="place-link"
              class="popup__input"
              name="link"
              placeholder="Enlace a la imagen"
              type="url"
              required
            />
            <span id="place-link-error" class="form__input-error"></span>

            <button class="popup__button" type="submit">Crear</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_image">
        <div class="popup__content popup__content_type_image">
          <button class="popup__close" type="button"></button>
          <img class="popup__image" src="#" alt="Imagen ampliada" />
          <p class="popup__caption"></p>
        </div>
      </div>

      <div class="popup popup_type_delete">
        <div class="popup__content">
          <button class="popup__close" type="button"></button>
          <h3 class="popup__title">¿Estás seguro?</h3>

          <form class="popup__form" id="delete-form">
            <button class="popup__button" type="submit">Sí</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_avatar">
        <div class="popup__content">
          <button class="popup__close" type="button"></button>
          <h3 class="popup__title">Cambiar foto de perfil</h3>

          <form class="popup__form" id="avatar-form" novalidate>
            <input
              type="url"
              name="avatar"
              id="avatar"
              class="popup__input"
              placeholder="Enlace a la imagen"
              required
            />
            <span id="avatar-error" class="form__input-error"></span>

            <button class="popup__button" type="submit">Guardar</button>
          </form>
        </div>
      </div>
    </div>

    <template id="card-template">
      <li class="card">
        <img class="card__image" src="" alt="" />

        <button class="card__delete-button" type="button"></button>

        <div class="card__description">
          <h2 class="card__title"></h2>

          <div class="card__like-container">
            <button class="card__like-button" type="button"></button>
          </div>
        </div>
      </li>
    </template>

    <script type="module" src="./src/index.js"></script>
  </body>
</html>
